<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260" role="img" aria-label="hannah how — AI, design, builder">
  <defs>
    <clipPath id="frame">
      <rect x="0" y="0" width="1000" height="260" rx="20"/>
    </clipPath>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#171028"/>
      <stop offset="50%" stop-color="#241640"/>
      <stop offset="100%" stop-color="#161226"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8fab">
        <animate attributeName="stop-color" values="#ff8fab;#b197fc;#7dd3fc;#ff8fab" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#b197fc">
        <animate attributeName="stop-color" values="#b197fc;#7dd3fc;#ff8fab;#b197fc" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7dd3fc">
        <animate attributeName="stop-color" values="#7dd3fc;#ff8fab;#b197fc;#7dd3fc" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8fab" stop-opacity="0"/>
      <stop offset="50%" stop-color="#b197fc"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>
    <filter id="soften" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
  </defs>

  <g clip-path="url(#frame)">
    <!-- deep gradient base -->
    <rect width="1000" height="260" fill="url(#bg)"/>

    <!-- drifting glow orbs -->
    <circle cx="140" cy="60" r="110" fill="#b197fc" opacity="0.38" filter="url(#soften)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 45 30; 0 0" dur="14s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="200" r="120" fill="#ff8fab" opacity="0.32" filter="url(#soften)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -50 -25; 0 0" dur="17s" repeatCount="indefinite"/>
    </circle>
    <circle cx="620" cy="30" r="90" fill="#7dd3fc" opacity="0.26" filter="url(#soften)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -30 40; 0 0" dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="340" cy="250" r="90" fill="#ffc09f" opacity="0.2" filter="url(#soften)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 35 -30; 0 0" dur="19s" repeatCount="indefinite"/>
    </circle>

    <!-- faint dot grid for texture -->
    <g fill="#ffffff" opacity="0.05">
      <circle cx="80" cy="200" r="1.5"/><circle cx="130" cy="150" r="1.5"/><circle cx="60" cy="110" r="1.5"/>
      <circle cx="200" cy="220" r="1.5"/><circle cx="250" cy="60" r="1.5"/><circle cx="180" cy="40" r="1.5"/>
      <circle cx="760" cy="50" r="1.5"/><circle cx="830" cy="100" r="1.5"/><circle cx="900" cy="50" r="1.5"/>
      <circle cx="940" cy="140" r="1.5"/><circle cx="790" cy="180" r="1.5"/><circle cx="870" cy="230" r="1.5"/>
    </g>

    <!-- galaxy star field -->
    <g fill="#ffffff">
      <circle cx="55" cy="35" r="1.4" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.2s" repeatCount="indefinite"/></circle>
      <circle cx="150" cy="90" r="1" opacity="0.5"/>
      <circle cx="105" cy="170" r="1.3" opacity="0.7"><animate attributeName="opacity" values="0.7;0.15;0.7" dur="4.1s" begin="0.7s" repeatCount="indefinite"/></circle>
      <circle cx="215" cy="30" r="1" opacity="0.6"/>
      <circle cx="190" cy="215" r="1.4" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.7s" begin="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="320" cy="25" r="1" opacity="0.5"/>
      <circle cx="420" cy="235" r="1.2" opacity="0.6"><animate attributeName="opacity" values="0.6;0.15;0.6" dur="3.6s" begin="0.4s" repeatCount="indefinite"/></circle>
      <circle cx="580" cy="230" r="1" opacity="0.5"/>
      <circle cx="680" cy="30" r="1.3" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3s" begin="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="800" cy="215" r="1" opacity="0.55"/>
      <circle cx="845" cy="55" r="1.4" opacity="0.8"><animate attributeName="opacity" values="0.8;0.25;0.8" dur="3.8s" begin="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="930" cy="120" r="1" opacity="0.5"/>
      <circle cx="955" cy="30" r="1.2" opacity="0.65"><animate attributeName="opacity" values="0.65;0.15;0.65" dur="2.9s" begin="2s" repeatCount="indefinite"/></circle>
      <circle cx="45" cy="230" r="1.1" opacity="0.55"/>
    </g>

    <!-- shooting star -->
    <g transform="translate(720,25)">
      <g opacity="0">
        <animate attributeName="opacity" values="0;0.9;0" keyTimes="0;0.15;0.45" dur="7s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate" values="0 0; 320 150" dur="7s" repeatCount="indefinite"/>
        <line x1="-34" y1="-16" x2="0" y2="0" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
        <circle r="2.2" fill="#ffffff"/>
      </g>
    </g>

    <!-- frosted glass card -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="6s" repeatCount="indefinite"/>
      <rect x="265" y="52" width="470" height="156" rx="26" fill="#ffffff" opacity="0.055"/>
      <rect x="265" y="52" width="470" height="156" rx="26" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.2"/>
      <path d="M291 52 h120 a0 0 0 0 1 0 0 l-28 156 h-120 Z" fill="#ffffff" opacity="0.035"/>

      <!-- name -->
      <text x="500" y="128" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="54" font-weight="700" letter-spacing="1" fill="url(#nameGrad)">hannah how</text>

      <!-- animated underline with travelling dot -->
      <line x1="360" y1="146" x2="640" y2="146" stroke="url(#lineGrad)" stroke-width="2"/>
      <circle r="3.5" fill="#ffffff" opacity="0.9">
        <animateMotion dur="4s" repeatCount="indefinite" path="M360,146 L640,146 L360,146"/>
        <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.1;0.9;1" dur="4s" repeatCount="indefinite"/>
      </circle>

      <!-- tagline -->
      <text x="500" y="182" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="17" font-weight="600" letter-spacing="7" fill="#e9dfff" opacity="0.92">AI ✦ DESIGN ✦ BUILDER</text>
    </g>

    <!-- twinkling sparkles -->
    <g fill="#ffffff">
      <path d="M0 -7 L1.8 -1.8 L7 0 L1.8 1.8 L0 7 L-1.8 1.8 L-7 0 L-1.8 -1.8 Z" transform="translate(230,90)">
        <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M0 -5 L1.3 -1.3 L5 0 L1.3 1.3 L0 5 L-1.3 1.3 L-5 0 L-1.3 -1.3 Z" transform="translate(775,80)">
        <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0.8s" repeatCount="indefinite"/>
      </path>
      <path d="M0 -6 L1.5 -1.5 L6 0 L1.5 1.5 L0 6 L-1.5 1.5 L-6 0 L-1.5 -1.5 Z" transform="translate(700,190)">
        <animate attributeName="opacity" values="0;0.9;0" dur="3.6s" begin="1.4s" repeatCount="indefinite"/>
      </path>
      <path d="M0 -5 L1.3 -1.3 L5 0 L1.3 1.3 L0 5 L-1.3 1.3 L-5 0 L-1.3 -1.3 Z" transform="translate(300,190)">
        <animate attributeName="opacity" values="0;0.8;0" dur="2.8s" begin="2s" repeatCount="indefinite"/>
      </path>
      <path d="M0 -4 L1 -1 L4 0 L1 1 L0 4 L-1 1 L-4 0 L-1 -1 Z" transform="translate(520,35)">
        <animate attributeName="opacity" values="0;0.7;0" dur="3.2s" begin="0.4s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
</svg>
