<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 70" width="1000" height="70" role="img" aria-label="">
  <defs>
    <linearGradient id="iridL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0"/>
      <stop offset="55%" stop-color="#b197fc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff8fab"/>
    </linearGradient>
    <linearGradient id="iridR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff8fab"/>
      <stop offset="45%" stop-color="#b197fc" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ribbon trails -->
  <path d="M60 35 C 180 25, 300 45, 462 35" stroke="url(#iridL)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M538 35 C 700 45, 820 25, 940 35" stroke="url(#iridR)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- center bow -->
  <g transform="translate(500,35)">
    <g>
      <animateTransform attributeName="transform" type="scale" values="1;1.07;1" dur="3s" repeatCount="indefinite"/>
      <!-- tails -->
      <path d="M-2 4 L -13 26 L -4 20 Z" fill="#f07a9b"/>
      <path d="M2 4 L 13 26 L 4 20 Z" fill="#f07a9b"/>
      <!-- loops -->
      <path d="M-2 0 C -16 -17 -38 -14 -33 1 C -37 13 -15 15 -2 0 Z" fill="#ff8fab"/>
      <path d="M-6 0 C -16 -10 -28 -9 -26 0 C -28 8 -16 9 -6 0 Z" fill="#f7b9d4" opacity="0.75"/>
      <path d="M2 0 C 16 -17 38 -14 33 1 C 37 13 15 15 2 0 Z" fill="#ff8fab"/>
      <path d="M6 0 C 16 -10 28 -9 26 0 C 28 8 16 9 6 0 Z" fill="#f7b9d4" opacity="0.75"/>
      <!-- knot -->
      <circle r="5.5" fill="#f7b9d4" stroke="#f07a9b" stroke-width="1.4"/>
    </g>
  </g>

  <!-- sparkles along the ribbon -->
  <g>
    <path d="M0 -6 L1.5 -1.5 L6 0 L1.5 1.5 L0 6 L-1.5 1.5 L-6 0 L-1.5 -1.5 Z" fill="#ff8fab" transform="translate(215,28)">
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M0 -4.5 L1.2 -1.2 L4.5 0 L1.2 1.2 L0 4.5 L-1.2 1.2 L-4.5 0 L-1.2 -1.2 Z" fill="#b197fc" transform="translate(340,44)">
      <animate attributeName="opacity" values="0;1;0" dur="3.4s" begin="0.8s" repeatCount="indefinite"/>
    </path>
    <path d="M0 -4.5 L1.2 -1.2 L4.5 0 L1.2 1.2 L0 4.5 L-1.2 1.2 L-4.5 0 L-1.2 -1.2 Z" fill="#7dd3fc" transform="translate(130,42)">
      <animate attributeName="opacity" values="0;0.9;0" dur="2.4s" begin="1.5s" repeatCount="indefinite"/>
    </path>
    <path d="M0 -6 L1.5 -1.5 L6 0 L1.5 1.5 L0 6 L-1.5 1.5 L-6 0 L-1.5 -1.5 Z" fill="#b197fc" transform="translate(785,28)">
      <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.4s" repeatCount="indefinite"/>
    </path>
    <path d="M0 -4.5 L1.2 -1.2 L4.5 0 L1.2 1.2 L0 4.5 L-1.2 1.2 L-4.5 0 L-1.2 -1.2 Z" fill="#ff8fab" transform="translate(660,44)">
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="1.1s" repeatCount="indefinite"/>
    </path>
    <path d="M0 -4.5 L1.2 -1.2 L4.5 0 L1.2 1.2 L0 4.5 L-1.2 1.2 L-4.5 0 L-1.2 -1.2 Z" fill="#7dd3fc" transform="translate(870,42)">
      <animate attributeName="opacity" values="0;0.9;0" dur="3.2s" begin="1.9s" repeatCount="indefinite"/>
    </path>
    <circle cx="280" cy="34" r="1.5" fill="#f7b9d4" opacity="0.6"/>
    <circle cx="415" cy="38" r="1.5" fill="#cdb9f7" opacity="0.6"/>
    <circle cx="590" cy="38" r="1.5" fill="#f7b9d4" opacity="0.6"/>
    <circle cx="725" cy="34" r="1.5" fill="#cdb9f7" opacity="0.6"/>
  </g>
</svg>
