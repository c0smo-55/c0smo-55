name: generate snake 🐍

on:
  # regenerates every day at midnight so the snake stays fresh
  schedule:
    - cron: "0 0 * * *"
  # lets you run it manually from the Actions tab
  workflow_dispatch:
  # regenerates whenever you push to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#b197fc
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#b197fc

      - name: push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
